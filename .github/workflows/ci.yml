name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: validate (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check code style
        run: composer cs:check

      - name: Static analysis
        run: composer analyse

      - name: Tests
        run: composer test

      - name: Optimized autoload
        run: composer dump-autoload --optimize

      - name: Consumer project smoke test
        run: |
          mkdir -p /tmp/vzaps-sdk-consumer
          cd /tmp/vzaps-sdk-consumer
          composer init --name=vzaps/consumer-smoke --no-interaction
          composer config repositories.vzaps-sdk path "$GITHUB_WORKSPACE"
          composer require vzaps/sdk:@dev --no-interaction
          php -r "require 'vendor/autoload.php'; new VZaps\\Sdk\\VZapsClient(clientToken: 'token', clientSecret: 'secret'); echo 'ok';"
