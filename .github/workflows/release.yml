name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run validation without creating a release'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must match vX.Y.Z" >&2
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check code style
        run: composer cs:check

      - name: Static analysis
        run: composer analyse

      - name: Tests
        run: composer test

      - name: Syntax check examples
        run: find examples -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: vzaps-sdk-php-source
          path: |
            .
            !vendor
            !.git

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: packagist
    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Ensure Packagist credentials
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "::error::Missing PACKAGIST_USERNAME or PACKAGIST_TOKEN in the packagist GitHub Environment."
            echo "Add both secrets under Settings → Environments → packagist, or enable the GitHub hook on https://packagist.org/packages/vzaps/sdk"
            exit 1
          fi

      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl -sSf -X POST \
            -u "$PACKAGIST_USERNAME:$PACKAGIST_TOKEN" \
            "https://packagist.org/api/update-package?username=$PACKAGIST_USERNAME&apiToken=$PACKAGIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/VZaps/vzaps-sdk-php"}}'
